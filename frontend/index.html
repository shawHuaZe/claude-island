<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Island</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    /* Outer layer - transparent frosted glass with highlight */
    .border-outer {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 4px solid transparent;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.5),
        inset 0 -1px 0 rgba(255, 255, 255, 0.2),
        inset 1px 0 0 rgba(255, 255, 255, 0.3),
        inset -1px 0 0 rgba(255, 255, 255, 0.1);
      position: relative;
    }

    /* Highlight effect in top-right corner */
    .border-outer::before {
      content: '';
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 100%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Inner layer - pure white solid background */
    .border-inner {
      background: rgb(255, 255, 255);
      border: 1px solid rgba(255, 255, 255, 1);
      box-shadow:
        inset 0 0 0 6px rgba(255, 255, 255, 0.98),
        inset 0 1px 3px rgba(0, 0, 0, 0.03);
    }

    /* Glow effects */
    .green-glow { box-shadow: 0 0 6px #10B981, 0 0 12px rgba(16, 185, 129, 0.3); }
    .blue-glow { box-shadow: 0 0 6px #3B82F6, 0 0 12px rgba(59, 130, 246, 0.3); }
    .purple-glow { box-shadow: 0 0 6px #8B5CF6, 0 0 12px rgba(139, 92, 246, 0.3); }
    .amber-glow { box-shadow: 0 0 6px #F59E0B, 0 0 12px rgba(245, 158, 11, 0.3); }

    .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 0 0 5px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    .pulse-ring-amber { animation: pulse-ring-amber 2s ease-out infinite; }
    @keyframes pulse-ring-amber {
      0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
      70% { box-shadow: 0 0 0 5px rgba(245, 158, 11, 0); }
      100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
    }

    .spinner {
      width: 9px;
      height: 9px;
      border: 1.5px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Island Container - fixed left side, vertically centered */
    .island-container {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
    }

    /* Collapsed Pill - default state */
    .island-collapsed {
      width: 64px;
      border-radius: 18px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .island-collapsed .inner {
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 8px;
      gap: 12px;
    }

    /* Expanded state - triggered by hover OR forced expansion */
    .island-container:hover .island-collapsed,
    .island-container.force-expanded .island-collapsed {
      width: 0;
      opacity: 0;
      padding: 0;
    }

    /* Card Panel */
    .card-panel {
      width: 0;
      opacity: 0;
      overflow: hidden;
      border-radius: 16px;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .island-container:hover .card-panel,
    .island-container.force-expanded .card-panel {
      width: 340px;
      opacity: 1;
    }

    /* Vertical text */
    .writing-vertical {
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    /* Cards */
    .card-wrapper {
      position: relative;
      overflow: hidden;
      transition: height 0.4s ease;
    }

    .card-stack {
      position: relative;
    }

    .card {
      width: 100%;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
    .card.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      position: relative;
    }

    /* Glass code block */
    .glass-code {
      background: rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    /* Badge */
    .badge {
      width: 20px;
      height: 20px;
      border-radius: 10px;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .badge-text {
      font-size: 9px;
      font-weight: 700;
      color: #475569;
    }
  </style>
</head>
<body>
  <!-- Floating Island Widget -->
  <div class="island-container" id="islandContainer">
    <!-- Collapsed Pill -->
    <div class="island-collapsed border-outer" onclick="handleCapsuleClick()">
      <div class="inner border-inner">
        <!-- Status indicator -->
        <div class="relative" id="capsuleStatus">
          <div class="absolute inset-0 w-2 h-2 rounded-full bg-emerald-500 pulse-ring"></div>
          <div class="relative w-2 h-2 rounded-full bg-emerald-500 green-glow"></div>
        </div>
        <!-- Task text (vertical) -->
        <div class="writing-vertical text-slate-700 text-[10px] font-semibold tracking-wide" id="capsuleText" style="max-height: 80px; overflow: hidden;">
          waiting
        </div>
        <!-- Task count badge -->
        <div class="badge" id="capsuleBadge">
          <span class="badge-text" id="capsuleBadgeText">0</span>
        </div>
      </div>
    </div>

    <!-- Card Panel -->
    <div class="card-panel border-outer">
      <div class="inner border-inner">
        <div id="cardContainer" class="card-wrapper" style="height: 140px;">
          <div id="cardSlide" class="card-stack">
            <!-- Dynamic cards will be inserted here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // State
    let ws = null;
    let sessions = new Map();
    let pendingPermissions = [];
    let activeCardIndex = 0;
    let forceExpanded = false;
    let autoExpandTimeout = null;
    let cardHeights = [];

    // DOM elements
    const islandContainer = document.getElementById('islandContainer');
    const cardSlide = document.getElementById('cardSlide');
    const cardContainer = document.getElementById('cardContainer');
    const capsuleText = document.getElementById('capsuleText');
    const capsuleBadge = document.getElementById('capsuleBadge');
    const capsuleBadgeText = document.getElementById('capsuleBadgeText');
    const capsuleStatus = document.getElementById('capsuleStatus');

    // Connect to WebSocket
    function connectWebSocket() {
      ws = new WebSocket('ws://127.0.0.1:8080/ws');

      ws.onopen = () => console.log('WebSocket connected');
      ws.onclose = () => {
        console.log('WebSocket disconnected, reconnecting...');
        setTimeout(connectWebSocket, 3000);
      };
      ws.onerror = (err) => console.error('WebSocket error:', err);

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          handleMessage(data);
        } catch (e) {
          console.error('Failed to parse message:', e);
        }
      };
    }

    // Handle incoming messages
    function handleMessage(data) {
      if (data.type === 'hook_event') {
        handleHookEvent(data);
      } else if (data.type === 'permission_update') {
        handlePermissionUpdate(data.permission);
      }
      updateCapsule();
      render();
    }

    // Handle hook events
    function handleHookEvent(data) {
      const session = data.session;
      sessions.set(session.id, session);

      if (data.permission) {
        // Add to pending permissions if not already there
        const exists = pendingPermissions.find(p => p.id === data.permission.id);
        if (!exists) {
          pendingPermissions.push(data.permission);
        }
      }

      // Auto-expand for attention-needed states
      const phase = session.phase;
      if (phase === 'waiting_for_approval' || phase === 'waiting_for_input') {
        triggerAutoExpand();
      }
    }

    // Handle permission updates
    function handlePermissionUpdate(permission) {
      pendingPermissions = pendingPermissions.filter(p => p.id !== permission.id);
      if (permission.status === 'pending') {
        pendingPermissions.push(permission);
        triggerAutoExpand();
      }
    }

    // Auto-expand when attention is needed
    function triggerAutoExpand() {
      forceExpanded = true;
      islandContainer.classList.add('force-expanded');
      activeCardIndex = 0;
      render();

      // Auto-collapse after 10 seconds if no interaction
      if (autoExpandTimeout) clearTimeout(autoExpandTimeout);
      autoExpandTimeout = setTimeout(() => {
        forceExpanded = false;
        islandContainer.classList.remove('force-expanded');
        render();
      }, 10000);
    }

    // Update capsule display
    function updateCapsule() {
      const activeSessions = Array.from(sessions.values()).filter(s => s.phase !== 'ended');

      // Update task count
      const totalTasks = activeSessions.length + pendingPermissions.length;
      capsuleBadgeText.textContent = totalTasks;

      // Update status indicator color and text
      const hasPermission = pendingPermissions.length > 0;
      const hasCompleted = activeSessions.some(s => s.phase === 'waiting_for_input');
      const hasProcessing = activeSessions.some(s => s.phase === 'processing' || s.phase === 'compacting');

      let statusClass = 'bg-emerald-500 green-glow';
      let statusAnimClass = 'pulse-ring';
      let displayText = 'waiting';

      if (hasPermission) {
        statusClass = 'bg-blue-500 blue-glow';
        statusAnimClass = '';
        displayText = 'auth required';
      } else if (hasCompleted) {
        statusClass = 'bg-emerald-500 green-glow';
        statusAnimClass = 'pulse-ring';
        // Get the most recent completed task title
        const completed = activeSessions.find(s => s.phase === 'waiting_for_input');
        displayText = completed?.current_task || 'task done';
      } else if (hasProcessing) {
        statusClass = 'bg-amber-500 amber-glow';
        statusAnimClass = 'pulse-ring-amber';
        const processing = activeSessions.find(s => s.phase === 'processing');
        displayText = processing?.current_task || 'processing';
      }

      capsuleStatus.innerHTML = `
        <div class="absolute inset-0 w-2 h-2 rounded-full ${statusClass} ${statusAnimClass}"></div>
        <div class="relative w-2 h-2 rounded-full ${statusClass}"></div>
      `;

      capsuleText.textContent = displayText;
    }

    // Render cards
    function render() {
      const cards = buildCards();

      if (cards.length === 0) {
        cardSlide.innerHTML = '';
        cardContainer.style.height = '0px';
        return;
      }

      cardSlide.innerHTML = cards.join('');
      cardHeights = cards.map((_, i) => estimateCardHeight(i));
      updateActiveCard();
    }

    // Build card HTML based on current state
    function buildCards() {
      const cards = [];

      // Add permission cards first (they need immediate attention)
      pendingPermissions.forEach((perm, idx) => {
        cards.push(buildPermissionCard(perm, idx));
      });

      // Add session cards
      const activeSessions = Array.from(sessions.values())
        .filter(s => s.phase !== 'ended')
        .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

      activeSessions.forEach((session, idx) => {
        if (session.phase === 'processing' || session.phase === 'compacting') {
          cards.push(buildProcessingCard(session, cards.length));
        } else if (session.phase === 'waiting_for_input') {
          cards.push(buildCompletedCard(session, cards.length));
        }
      });

      return cards;
    }

    function buildProcessingCard(session, index) {
      const taskText = session.current_task || 'Processing...';
      return `
        <div class="card p-3" data-index="${index}">
          <div class="flex items-center gap-2 mb-2">
            <div class="relative flex-shrink-0">
              <div class="absolute inset-0 w-2 h-2 rounded-full bg-amber-500 pulse-ring-amber"></div>
              <div class="relative w-2 h-2 rounded-full bg-amber-500 amber-glow"></div>
            </div>
            <span class="text-slate-800 font-semibold text-sm truncate flex-1">${escapeHtml(taskText)}</span>
            <div class="flex gap-1 flex-shrink-0">
              <span class="bg-slate-100 rounded-full px-1.5 py-0.5 text-[9px] font-medium text-slate-600">claude</span>
              <span class="bg-amber-50 rounded-full px-1.5 py-0.5 text-[9px] font-medium text-amber-600 flex items-center gap-1">
                <span class="spinner text-amber-500"></span>
                processing
              </span>
            </div>
          </div>
          <p class="text-[11px] text-slate-500">Claude is working on your request...</p>
        </div>
      `;
    }

    function buildCompletedCard(session, index) {
      const taskText = session.current_task || 'Task Completed';
      const userPrompt = session.user_prompt || 'Click to view details';
      return `
        <div class="card p-3" data-index="${index}" onclick="handleCardClick('${session.id}')" style="cursor: pointer;">
          <div class="flex items-center gap-2 mb-2">
            <div class="relative flex-shrink-0">
              <div class="absolute inset-0 w-2 h-2 rounded-full bg-emerald-500 pulse-ring"></div>
              <div class="relative w-2 h-2 rounded-full bg-emerald-500 green-glow"></div>
            </div>
            <span class="text-slate-800 font-semibold text-sm truncate flex-1">${escapeHtml(taskText)}</span>
            <div class="flex gap-1 flex-shrink-0">
              <span class="bg-slate-100 rounded-full px-1.5 py-0.5 text-[9px] font-medium text-slate-600">claude</span>
            </div>
          </div>
          <p class="text-[11px] text-slate-500 mb-1"><span class="text-slate-400 font-medium">User:</span> ${escapeHtml(userPrompt.substring(0, 50))}</p>
          <div class="flex items-center gap-1">
            <svg class="w-3 h-3 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            <span class="text-emerald-500 font-medium text-xs">Done — Click to jump</span>
          </div>
        </div>
      `;
    }

    function buildPermissionCard(permission, index) {
      const toolName = permission.tool_name || 'Unknown';
      let toolInputDisplay = '';
      let codePreview = '';

      if (permission.tool_input) {
        try {
          const input = JSON.parse(permission.tool_input);
          // Show simplified preview
          if (input.command) {
            toolInputDisplay = `Command: ${input.command.substring(0, 40)}...`;
            codePreview = `
              <div class="glass-code rounded-lg p-2 text-[10px] font-mono leading-relaxed mb-2">
                <div class="flex gap-1"><span class="text-slate-700">${escapeHtml(input.command.substring(0, 60))}</span></div>
              </div>
            `;
          } else {
            toolInputDisplay = JSON.stringify(input).substring(0, 50) + '...';
          }
        } catch {
          toolInputDisplay = permission.tool_input.substring(0, 50);
        }
      }

      return `
        <div class="card p-3" data-index="${index}" data-permission-id="${permission.id}">
          <div class="flex items-center gap-2 mb-2">
            <div class="relative flex-shrink-0">
              <div class="relative w-2 h-2 rounded-full bg-blue-500 blue-glow"></div>
            </div>
            <span class="text-slate-800 font-semibold text-sm truncate flex-1">${escapeHtml(toolName)}</span>
            <div class="flex gap-1 flex-shrink-0">
              <span class="bg-slate-100 rounded-full px-1.5 py-0.5 text-[9px] font-medium text-slate-600">auth</span>
            </div>
          </div>
          <p class="text-[11px] mb-2">${escapeHtml(toolInputDisplay)}</p>
          ${codePreview}
          <div class="flex gap-2">
            <button class="flex-1 py-2 px-3 bg-slate-800 text-white font-semibold text-xs rounded-lg hover:bg-slate-700 transition-all" onclick="handleDeny('${permission.id}', event)">Deny</button>
            <button class="flex-1 py-2 px-3 bg-emerald-500 text-white font-semibold text-xs rounded-lg hover:bg-emerald-600 transition-all" onclick="handleApprove('${permission.id}', event)">Accept</button>
          </div>
        </div>
      `;
    }

    function estimateCardHeight(index) {
      // Approximate heights based on card type
      return 140;
    }

    function updateActiveCard() {
      const cards = cardSlide.querySelectorAll('.card');
      const maxIndex = cards.length - 1;

      cards.forEach((card, i) => {
        if (i === activeCardIndex) {
          card.classList.add('active');
        } else {
          card.classList.remove('active');
        }
      });

      const height = cardHeights[activeCardIndex] || 140;
      cardContainer.style.height = height + 'px';
    }

    // Handle wheel scroll to switch cards
    document.querySelector('.card-panel').addEventListener('wheel', (e) => {
      const cards = cardSlide.querySelectorAll('.card');
      if (cards.length <= 1) return;

      e.preventDefault();
      if (e.deltaY > 0) {
        activeCardIndex = Math.min(cards.length - 1, activeCardIndex + 1);
      } else if (e.deltaY < 0) {
        activeCardIndex = Math.max(0, activeCardIndex - 1);
      }
      updateActiveCard();
    }, { passive: false });

    // Handle mouse leave - collapse if not forced
    islandContainer.addEventListener('mouseleave', () => {
      if (!forceExpanded) {
        activeCardIndex = 0;
        updateActiveCard();
      }
    });

    // Handle capsule click - jump to Claude Code
    function handleCapsuleClick() {
      jumpToClaudeCode();
    }

    // Handle card click - jump to Claude Code
    function handleCardClick(sessionId) {
      jumpToClaudeCode();
    }

    // Jump to Claude Code terminal
    function jumpToClaudeCode() {
      window.electronAPI?.jumpToTerminal?.();
    }

    // Handle approve
    async function handleApprove(permissionId, event) {
      event?.stopPropagation();
      try {
        await window.electronAPI?.approvePermission(permissionId);
        // Card will be removed via WebSocket update
      } catch (err) {
        console.error('Failed to approve:', err);
      }
    }

    // Handle deny
    async function handleDeny(permissionId, event) {
      event?.stopPropagation();
      try {
        await window.electronAPI?.denyPermission(permissionId);
        // Card will be removed via WebSocket update
      } catch (err) {
        console.error('Failed to deny:', err);
      }
    }

    // Escape HTML
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initialize
    async function init() {
      // Load initial data
      try {
        const sessionsData = await window.electronAPI?.getSessions?.() || [];
        sessionsData.forEach(s => sessions.set(s.id, s));

        const permissionsData = await window.electronAPI?.getPendingPermissions?.() || [];
        pendingPermissions = permissionsData;
      } catch (err) {
        console.error('Failed to load initial data:', err);
      }

      updateCapsule();
      render();
      connectWebSocket();
    }

    init();
  </script>
</body>
</html>
